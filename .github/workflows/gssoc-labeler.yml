name: GSSoC Labeler

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

jobs:
  label_gssoc:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Check and add GSSoC label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue?.body || context.payload.pull_request?.body || '';
            const gssocPattern = /\[x\]\s*I am participating in GSSoC 2026/i;
            
            if (gssocPattern.test(body)) {
              const issue_number = context.payload.issue?.number || context.payload.pull_request?.number;
              if (issue_number) {
                await github.rest.issues.addLabels({
                  issue_number: issue_number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: ['gssoc26']
                });
              }
            }
